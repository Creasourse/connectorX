server {
        listen 80;
        #listen 443 ssl;
        server_name client-connectorx.livepulse.com.cn;
        access_log  /home/cs_conn/logs/client-connectorx-access.log;
        error_log   /home/cs_conn/logs/client-connectorx-error.log;
        gzip_static on;
        #ssl_certificate  /home/cs_conn/nginx_conf/ssl/jfrog.livepulse.com.cn_bundle.pem;
        #ssl_certificate_key /home/cs_conn/nginx_conf/ssl/jfrog.livepulse.com.cn.key;
        #ssl_session_cache    shared:SSL:1m;
        #ssl_session_timeout  5m;
        large_client_header_buffers 4 16k;     # 读取大型客户端请求头的缓冲区的最大数量和大小
        client_max_body_size 300m;            #设置nginx能处理的最大请求主体大小。
        client_body_buffer_size 128k;          #请求主体的缓冲区大小。
        proxy_connect_timeout 600;
        proxy_read_timeout 600;
        proxy_send_timeout 600;
        proxy_buffer_size 128k;
        proxy_buffers   16 128k;
        proxy_busy_buffers_size 128k;
        proxy_temp_file_write_size 128k;

        root /home/cs_conn/client-connectorx/frontend;

        location / {
              index index.html index.htm;
              try_files $uri $uri/ /index.html;
        }

        location /api {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://localhost:24001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }


       location /wecom-open {
            rewrite ^/wecom-open/(.*) /$1 break;
            proxy_pass http://localhost:23003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

     location /images/ {
        # 直接构建目标URL
        proxy_pass http://localhost/images/;

        # 代理请求
        # proxy_pass $target_url;

        # 设置超时
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;

        # 传递必要头部
        #proxy_set_header Host $host;
    }



}